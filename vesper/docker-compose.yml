services:
  backend:
    build:
      context: ./backend
    env_file:
      # Injects API_SECRET (and the rest of the Vesper vars) into the
      # container. NOTE: do not re-declare API_SECRET under `environment:` with
      # ${API_SECRET} — compose resolves that from a .env beside THIS file
      # (vesper/), not ../.env, so it would resolve blank and override this.
      - ../.env
    environment:
      - CLAUDE_PROJECT_DIR=/workspace
      - VAULT_PATH=/workspace/Dynamous/Memory
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ../Dynamous/Memory:/workspace/Dynamous/Memory
      - ../.claude/scripts:/workspace/.claude/scripts:ro
      - ../.claude/data:/workspace/.claude/data
      - ../.env:/workspace/.env:ro
      - ./backend:/workspace/backend:ro
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - vesper-net

  # Opt-in workers (host Task Scheduler + tray stay the live system). Start them
  # with: docker compose --profile workers up
  discord:
    build:
      context: ..
      dockerfile: vesper/worker/Dockerfile
    profiles: ["workers"]
    command: ["python", ".claude/chat/discord_bot.py"]
    env_file:
      - ../.env
    environment:
      - CLAUDE_PROJECT_DIR=/workspace
      - TZ=Asia/Kuala_Lumpur
    volumes:
      # Vault is read-WRITE here — the bot caches messages (cache-only after Phase 4).
      - ../Dynamous/Memory:/workspace/Dynamous/Memory
      - ../.claude/scripts:/workspace/.claude/scripts:ro
      - ../.claude/chat:/workspace/.claude/chat:ro
      - ../.claude/data:/workspace/.claude/data
      - ../.env:/workspace/.env:ro
    restart: unless-stopped
    networks:
      - vesper-net

  scheduler:
    build:
      context: ..
      dockerfile: vesper/worker/Dockerfile
    profiles: ["workers"]
    command: ["python", "vesper/worker/scheduler.py"]
    env_file:
      - ../.env
    environment:
      - CLAUDE_PROJECT_DIR=/workspace
      - TZ=Asia/Kuala_Lumpur
    volumes:
      - ../Dynamous/Memory:/workspace/Dynamous/Memory
      - ../.claude/scripts:/workspace/.claude/scripts:ro
      - ../.claude/chat:/workspace/.claude/chat:ro
      - ../.claude/data:/workspace/.claude/data
      - ../.env:/workspace/.env:ro
    restart: unless-stopped
    networks:
      - vesper-net

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vesper-net

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    networks:
      - vesper-net

  # Whisper (speech-to-text) and TTS services added in Phase 4 with proper image setup

volumes:
  ollama_data:

networks:
  vesper-net:
